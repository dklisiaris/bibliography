name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DISABLE_SPRING: 1
      DEVELOPMENT_DATABASE_USERNAME: postgres
      DEVELOPMENT_DATABASE_PASSWORD: postgres
      REDIS_SERVER_URL: redis://127.0.0.1:6379/0
      REDIS_CLIENT_URL: redis://127.0.0.1:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build Hotwire assets
        run: npm run build

      - name: Verify Hotwire build artifacts
        run: npm run verify:build

      - name: Prepare database
        run: bundle exec rails db:prepare

      - name: Zeitwerk check
        run: bundle exec rails zeitwerk:check

      - name: RSpec
        run: bundle exec rspec

  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Bundle audit
        run: |
          bundle exec bundle-audit update
          bundle exec bundle-audit check
